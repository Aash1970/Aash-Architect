name: Career Architect — CI Pipeline

on:
  push:
    branches:
      - main
      - "claude/**"
  pull_request:
    branches:
      - main

jobs:
  # ── Test suite ──────────────────────────────────────────────────────────────
  test:
    name: "Python 3.11 — pytest"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          python -m pytest app/tests/ \
            --tb=short \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -v
        env:
          # Tests run in local/in-memory mode (no Supabase credentials needed)
          LOG_LEVEL: WARNING

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  # ── Architecture enforcement ────────────────────────────────────────────────
  architecture:
    name: "Architecture Compliance"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify no Streamlit outside /ui
        run: |
          python - <<'EOF'
          import ast, sys, pathlib, textwrap

          violations = []
          root = pathlib.Path("app")
          for path in root.rglob("*.py"):
              parts = path.parts
              # Allow Streamlit imports only inside app/ui/
              if "ui" in parts:
                  continue
              try:
                  tree = ast.parse(path.read_text(encoding="utf-8"))
              except SyntaxError:
                  continue
              for node in ast.walk(tree):
                  if isinstance(node, (ast.Import, ast.ImportFrom)):
                      names = [a.name for a in getattr(node, "names", [])]
                      module = getattr(node, "module", "") or ""
                      if "streamlit" in module or any("streamlit" in n for n in names):
                          violations.append(f"{path}:{node.lineno} — streamlit import")

          if violations:
              print("ARCHITECTURE VIOLATION — Streamlit imported outside /ui:")
              for v in violations:
                  print(f"  {v}")
              sys.exit(1)
          print("OK — No Streamlit imports outside app/ui/")
          EOF

      - name: Verify no permission_matrix imports in UI pages
        run: |
          python - <<'EOF'
          import ast, sys, pathlib

          violations = []
          pages_dir = pathlib.Path("app/ui/pages")
          for path in pages_dir.rglob("*.py"):
              try:
                  tree = ast.parse(path.read_text(encoding="utf-8"))
              except SyntaxError:
                  continue
              for node in ast.walk(tree):
                  if isinstance(node, ast.ImportFrom):
                      module = node.module or ""
                      if "permission_matrix" in module:
                          violations.append(f"{path}:{node.lineno}")

          if violations:
              print("VIOLATION — permission_matrix imported in UI pages:")
              for v in violations:
                  print(f"  {v}")
              sys.exit(1)
          print("OK — No permission_matrix imports in UI pages")
          EOF

      - name: Verify no scoring_engine imports in UI pages
        run: |
          python - <<'EOF'
          import ast, sys, pathlib

          violations = []
          pages_dir = pathlib.Path("app/ui/pages")
          for path in pages_dir.rglob("*.py"):
              try:
                  tree = ast.parse(path.read_text(encoding="utf-8"))
              except SyntaxError:
                  continue
              for node in ast.walk(tree):
                  if isinstance(node, ast.ImportFrom):
                      module = node.module or ""
                      if "scoring_engine" in module:
                          violations.append(f"{path}:{node.lineno}")

          if violations:
              print("VIOLATION — scoring_engine imported in UI pages:")
              for v in violations:
                  print(f"  {v}")
              sys.exit(1)
          print("OK — No scoring_engine imports in UI pages")
          EOF

  # ── Docker build check ──────────────────────────────────────────────────────
  docker:
    name: "Docker Build"
    runs-on: ubuntu-latest
    needs: [test, architecture]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            --tag career-architect:ci-${{ github.sha }} \
            --file Dockerfile \
            .

      - name: Smoke-test image (import check)
        run: |
          docker run --rm \
            -e SUPABASE_URL="" \
            -e SUPABASE_KEY="" \
            career-architect:ci-${{ github.sha }} \
            python -c "
          from app.services.cv_service import CVService
          from app.services.ats_service import ATSService
          from app.ats.scoring_engine import ATSEngine
          from app.security.encryption import EncryptionService
          from app.tier.tier_rules import get_tier_limits
          from app.roles.permission_matrix import has_permission
          from app.gdpr.consent import ConsentService
          from app.gdpr.erasure import ErasureService
          from app.drafts.draft_service import DraftService
          from app.logging.logger import get_logger, AuditLogger
          print('All critical imports OK')
          "
